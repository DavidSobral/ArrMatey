name: iOS CI

on:
  #push:
  #  branches: [ "main", "master" ]
  #pull_request:
  #  branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering from the UI

jobs:
  build:
    name: Build iOS IPA (Sideload)
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      # Set Current Date As Env Variable
      - name: Set current date as env variable
        run: echo "date_today=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      # Set Repository Name As Env Variable
      - name: Set repository name as env variable
        run: echo "repository_name=$(echo '${{ github.repository }}' | awk -F '/' '{print $2}')" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      # Required to compile the Kotlin Multiplatform shared framework
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # xcodebuild archive triggers the Xcode build phase which calls:
      # ./gradlew :shared:embedAndSignAppleFrameworkForXcode
      # This compiles the Kotlin Multiplatform shared framework automatically.
      # Signing is disabled — sideloading tools (AltStore, Sideloadly) re-sign with the user's own Apple ID.
      - name: Archive iOS App (unsigned)
        run: |
          cd iosApp
          xcodebuild archive \
            -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/ArrMatey.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          APP_PATH=$(find $RUNNER_TEMP/ArrMatey.xcarchive/Products/Applications -name "*.app" | head -1)
          cp -r "$APP_PATH" $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r ArrMatey.ipa Payload

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: automated-ios
          name: "Automated iOS IPA Build (${{ github.event.repository.updated_at }})"
          body: "Automated workflow triggered build from the latest main branch."
          draft: false
          prerelease: true
          files: ${{ runner.temp }}/ArrMatey.ipa
